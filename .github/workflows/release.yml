name: Release

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
          - os: macos-13
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build release binary
        shell: bash
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package archive (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          artifact="nattypetester-${{ github.ref_name }}-${{ matrix.target }}.tar.gz"
          cp "target/${{ matrix.target }}/release/nattypetester" ./nattypetester
          chmod +x ./nattypetester
          tar -czf "$artifact" ./nattypetester
          shasum -a 256 "$artifact" > "$artifact.sha256"

      - name: Package archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $artifact = "nattypetester-${{ github.ref_name }}-${{ matrix.target }}.zip"
          Copy-Item "target/${{ matrix.target }}/release/nattypetester.exe" "nattypetester.exe"
          Compress-Archive -Path "nattypetester.exe" -DestinationPath $artifact -Force
          $hash = (Get-FileHash -Algorithm SHA256 $artifact).Hash.ToLower()
          "$hash  $artifact" | Out-File -FilePath "$artifact.sha256" -Encoding ascii

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            nattypetester-${{ github.ref_name }}-${{ matrix.target }}.*

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: dist/*
